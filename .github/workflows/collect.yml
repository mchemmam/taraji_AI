name: Collect news

on:
  schedule:
    # Every 15 minutes, offset from :00 to avoid GitHub's top-of-the-hour
    # congestion (scheduled runs are best-effort and queue behind load)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

# Never run two collections at once - they would race on the database commit
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the branch tip at job start, not the SHA snapshotted at
          # run creation - a queued run's snapshot predates the previous run's
          # database push, which re-sends already-published articles
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py collect

      - name: Distribute to Telegram
        # No-ops gracefully while the Telegram secrets are not configured
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py distribute

      - name: Commit updated database
        run: |
          git config user.name "taraji-ai-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/taraji_ai.db
          if ! git diff --cached --quiet; then
            git commit -m "data: update articles database"
            if ! git push; then
              # Remote advanced mid-run - with runs serialized on the branch
              # tip that can only be a non-database commit (e.g. code pushed
              # from a laptop), so rebase it in and retry once. A rebase
              # conflict would mean concurrent database writes; fail loudly
              # (Telegram alert) instead of silently overwriting one side.
              git pull --rebase origin main
              git push
            fi
          else
            echo "No new articles this run - nothing to commit"
          fi

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Falls back to the main chat; set the TELEGRAM_ALERT_CHAT_ID secret
          # once TELEGRAM_CHAT_ID points at the public channel, so failure
          # alerts stay private
          ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s --max-time 20 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${ALERT_CHAT_ID}" \
            -d text="⚠️ Taraji AI: collect workflow failed - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true
